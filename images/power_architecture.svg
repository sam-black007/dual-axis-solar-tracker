<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgLight)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="24" font-weight="bold">⚡ Power Architecture</text>
  
  <!-- Battery -->
  <rect x="60" y="100" width="160" height="120" rx="10" fill="#22c55e" filter="url(#shadow)"/>
  <rect x="60" y="100" width="160" height="35" rx="10" fill="#16a34a"/>
  <text x="140" y="123" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Battery</text>
  <text x="140" y="160" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">🔋 2×18650</text>
  <text x="140" y="185" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="14">7.4V Li-ion</text>
  
  <!-- Arrow 1 -->
  <line x1="220" y1="160" x2="280" y2="160" stroke="#64748b" stroke-width="3"/>
  <polygon points="280,155 295,160 280,165" fill="#64748b"/>
  
  <!-- Boost Converter -->
  <rect x="300" y="100" width="160" height="120" rx="10" fill="#f59e0b" filter="url(#shadow)"/>
  <rect x="300" y="100" width="160" height="35" rx="10" fill="#d97706"/>
  <text x="380" y="123" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Boost Converter</text>
  <text x="380" y="160" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="bold">⚡ DC-DC</text>
  <text x="380" y="185" text-anchor="middle" fill="#fef3c7" font-family="Arial, sans-serif" font-size="16">5V @ 2A+</text>
  
  <!-- Arrow 2 -->
  <line x1="460" y1="160" x2="520" y2="160" stroke="#64748b" stroke-width="3"/>
  <polygon points="520,155 535,160 520,165" fill="#64748b"/>
  
  <!-- Distribution Box -->
  <rect x="540" y="100" width="160" height="120" rx="10" fill="#3b82f6" filter="url(#shadow)"/>
  <rect x="540" y="100" width="160" height="35" rx="10" fill="#2563eb"/>
  <text x="620" y="123" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Power Out</text>
  <text x="620" y="155" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="14">5V Supply</text>
  <line x1="560" y1="165" x2="680" y2="165" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4"/>
  <text x="620" y="185" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="12">All Components</text>
  
  <!-- Split Lines -->
  <line x1="620" y1="220" x2="620" y2="260" stroke="#64748b" stroke-width="3"/>
  <line x1="620" y1="260" x2="250" y2="260" stroke="#64748b" stroke-width="2"/>
  <line x1="250" y1="260" x2="250" y2="300" stroke="#64748b" stroke-width="2"/>
  <line x1="620" y1="260" x2="620" y2="300" stroke="#64748b" stroke-width="2"/>
  <line x1="620" y1="260" x2="990" y2="260" stroke="#64748b" stroke-width="2"/>
  <line x1="990" y1="260" x2="990" y2="300" stroke="#64748b" stroke-width="2"/>
  
  <!-- Arduino Box -->
  <rect x="170" y="305" width="160" height="100" rx="10" fill="#00979d" filter="url(#shadow)"/>
  <rect x="170" y="305" width="160" height="30" rx="10" fill="#007a82"/>
  <text x="250" y="325" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Arduino UNO</text>
  <text x="250" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12">• Servos</text>
  <text x="250" y="375" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12">• LCD Display</text>
  <text x="250" y="395" text-anchor="middle" fill="#b2f5ea" font-family="Arial, sans-serif" font-size="11">5V Input</text>
  
  <!-- ESP32 Box -->
  <rect x="540" y="305" width="160" height="100" rx="10" fill="#6366f1" filter="url(#shadow)"/>
  <rect x="540" y="305" width="160" height="30" rx="10" fill="#4f46e5"/>
  <text x="620" y="325" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">ESP32</text>
  <text x="620" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12">• DHT11 Sensor</text>
  <text x="620" y="375" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12">• BMP280 Sensor</text>
  <text x="620" y="395" text-anchor="middle" fill="#c7d2fe" font-family="Arial, sans-serif" font-size="11">5V Input</text>
  
  <!-- LDR Box -->
  <rect x="910" y="305" width="120" height="100" rx="10" fill="#64748b" filter="url(#shadow)"/>
  <rect x="910" y="305" width="120" height="30" rx="10" fill="#475569"/>
  <text x="970" y="325" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Sensors</text>
  <text x="970" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12">• 4× LDR</text>
  <text x="970" y="375" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="12">• Encoder</text>
  <text x="970" y="395" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="11">5V Input</text>
  
  <!-- GND Line -->
  <line x1="250" y1="410" x2="990" y2="410" stroke="#ef4444" stroke-width="3"/>
  <text x="620" y="435" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="14" font-weight="bold">🔴 Common GND (All Components)</text>
  
  <!-- Footer -->
  <text x="450" y="475" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">github.com/sam-black007/dual-axis-solar-tracker</text>
</svg>
